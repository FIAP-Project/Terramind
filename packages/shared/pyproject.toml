[project]
name = "terramind-shared"
version = "0.1.0"
description = "Biblioteca compartilhada do Terramind — config, DB, security, eventos, middleware."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "aio-pika>=9.4",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7.4",
    "structlog>=24.1",
    "email-validator>=2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/terramind_shared"]

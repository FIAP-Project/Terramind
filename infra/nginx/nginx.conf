user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logs com request_id propagado
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rid=$http_x_request_id';
    access_log /var/log/nginx/access.log main;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;

    # Upstreams para os 4 serviços (DNS do Docker resolve para o container)
    upstream auth_upstream   { server auth-service:8001;   keepalive 16; }
    upstream farm_upstream   { server farm-service:8002;   keepalive 16; }
    upstream sensor_upstream { server sensor-service:8003; keepalive 16; }
    upstream alert_upstream  { server alert-service:8004;  keepalive 16; }

    # Headers de segurança comuns
    map $sent_http_content_type $is_html {
        default 0;
        ~*text/html 1;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 8080;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    # HTTPS gateway
    server {
        listen 8443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'" always;

        # Rate limit global
        limit_req zone=global burst=60 nodelay;

        # Tamanho máximo de body (proteção contra payload bombing)
        client_max_body_size 1m;

        # Proxy comum
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $http_x_request_id;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 30s;

        # Auth (login com rate limit mais restritivo)
        location /auth/login {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://auth_upstream;
        }
        location /auth/ {
            proxy_pass http://auth_upstream;
        }

        location /farm/ {
            proxy_pass http://farm_upstream;
        }

        location /sensor/ {
            proxy_pass http://sensor_upstream;
        }

        location /alert/ {
            proxy_pass http://alert_upstream;
        }

        # Página raiz com links para Swaggers
        location = / {
            default_type text/html;
            return 200 '<!doctype html><html><head><title>Terramind</title></head><body><h1>Terramind</h1><ul><li><a href="/auth/docs">auth</a></li><li><a href="/farm/docs">farm</a></li><li><a href="/sensor/docs">sensor</a></li><li><a href="/alert/docs">alert</a></li></ul></body></html>';
        }
    }
}
